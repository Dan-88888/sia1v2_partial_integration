<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>SUSA - ParSU</title>
    <link rel="icon" type="image/png" href="PSU.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar"></div>

<div class="center-box">
    <img src="PSU.png" class="logo">

    <h2>Partido State University</h2>
    <p>Goa, Camarines Sur</p>

    <div class="role">ADMINISTRATOR</div>
    <form id="loginForm" class="form-stack">
        <div class="input-group">
            <label>User ID:</label>
          <input type="text" id="username" required>
        </div>

        <div class="input-group">
            <label>Password:</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit" class="btn">Login</button>
    </form>
    <p id="message" style="color:red;"></p>
    <button class="btn gray">Forgot password</button>

    <div style="width:260px;margin:16px auto 0;padding:8px;background-color:#eef2ff;border:1.5px solid #a5b4fc;border-radius:8px;text-align:center;">
        <p style="font-size:11px;font-weight:bold;margin:0 0 1px 0;color:#000035;">Demo Credentials:</p>
        <div style="font-size:11px;display:inline-flex;flex-direction:column;align-items:flex-start;gap:2px;">
            <div style="display:flex;gap:4px;">
                <span style="width:60px;text-align:right;font-weight:500;color:#000035;">User ID:</span>
                <span style="color:#000000;white-space:nowrap;">adminparsu01</span>
            </div>
            <div style="display:flex;gap:4px;">
                <span style="width:60px;text-align:right;font-weight:500;color:#000035;">Password:</span>
                <span style="color:#000000;white-space:nowrap;">@admin#2026</span>
            </div>
        </div>
    </div>
</div>
<script src="login.js"></script>

</body>
</html>
