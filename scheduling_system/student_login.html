<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>SUSA - ParSU</title>
    <link rel="icon" type="image/png" href="PSU.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar"></div>

<div class="center-box">
    <img src="PSU.png" class="logo">

    <h2>Partido State University</h2>
    <p>Goa, Camarines Sur</p>

    <div class="role">STUDENT</div>

    <form id="loginForm" class="form-stack">
        <div class="input-group">
            <label>User ID:</label>
           <input type="text" id="username" required>
        </div>

        <div class="input-group">
            <label>Password:</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit" class="btn">Login</button>
    </form>
    <p id="message" style="color:red;"></p>
    <button class="btn gray">Forgot password</button>

    <div style="width:280px;margin:16px auto 0;padding:12px 16px;background:#fefce8;border:1px solid #fde68a;border-radius:10px;text-align:left;">
        <p style="margin:0 0 8px 0;font-size:13px;color:#92400e;font-weight:bold;text-align:center;">Demo Credentials (Student)</p>
        <p style="margin:1px 0;font-size:11px;color:#78350f;"><b>Password for all:</b> <code style="color:#92400e;">12345</code></p>
        <hr style="border-color:#fde68a;margin:6px 0;">
        <p style="margin:2px 0;font-size:11px;color:#78350f;">Section 2A &mdash; <code style="color:#92400e;">2024002</code> (Ana Reyes)</p>
        <p style="margin:2px 0;font-size:11px;color:#78350f;">Section 2B &mdash; <code style="color:#92400e;">2024001</code> (Pepito Manaloto)</p>
        <p style="margin:2px 0;font-size:11px;color:#78350f;">Section 2C &mdash; <code style="color:#92400e;">2024003</code> (Carlo Santos)</p>
        <p style="margin:2px 0;font-size:11px;color:#78350f;">Section 2D &mdash; <code style="color:#92400e;">2024004</code> (Diana Lim)</p>
    </div>
</div>
<script src="login.js"></script>
</body>
</html>
