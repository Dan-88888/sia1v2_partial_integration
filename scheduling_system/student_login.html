<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Login - Student</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar"></div>

<div class="center-box">
    <img src="PSU.png" class="logo">

    <h2>Partido State University</h2>
    <p>Goa, Camarines Sur</p>

    <div class="role">STUDENT</div>

    <form id="loginForm" class="form-stack">
        <div class="input-group">
            <label>User ID:</label>
           <input type="text" id="username" required>
        </div>

        <div class="input-group">
            <label>Password:</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit" class="btn">Login</button>
    </form>
    <p id="message" style="color:red;"></p>
    <button class="btn gray">Forgot password</button>

    <div style="width:260px;margin:16px auto 0;padding:12px 16px;background:#fefce8;border:1px solid #fde68a;border-radius:10px;text-align:center;">
        <p style="margin:0 0 6px 0;font-size:13px;color:#92400e;font-weight:bold;">Demo Credentials (Student)</p>
        <p style="margin:2px 0;font-size:12px;color:#78350f;">User ID: &nbsp;<code style="color:#92400e;font-size:12px;">2024001</code></p>
        <p style="margin:2px 0;font-size:12px;color:#78350f;">Password: <code style="color:#92400e;font-size:12px;">12345</code></p>
    </div>
</div>
<script src="login.js"></script>
</body>
</html>
