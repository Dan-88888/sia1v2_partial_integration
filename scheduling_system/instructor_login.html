<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Login - Instructor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar"></div>

<div class="center-box">
    <img src="PSU.png" class="logo">

    <h2>Partido State University</h2>
    <p>Goa, Camarines Sur</p>

    <div class="role">INSTRUCTOR</div>

    <form id="loginForm" class="form-stack" method="POST">
        <div class="input-group">
    <label>User ID:</label>
    <input type="text" name="username" id="username" required>
</div>

<div class="input-group">
    <label>Password:</label>
    <input type="password" name="password" id="password" required>
</div>

        <button type="submit" class="btn">Login</button>
    </form>
    <p id="message" style="color:red;"></p>
    <button class="btn gray">Forgot password</button>

    <div style="width:260px;margin:16px auto 0;padding:12px 16px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;text-align:center;">
        <p style="margin:0 0 6px 0;font-size:13px;color:#166534;font-weight:bold;">Demo Credentials (Instructor)</p>
        <p style="margin:2px 0;font-size:12px;color:#14532d;">User ID: &nbsp;<code style="color:#166534;font-size:12px;">inst01</code></p>
        <p style="margin:2px 0;font-size:12px;color:#14532d;">Password: <code style="color:#166534;font-size:12px;">12345</code></p>
    </div>
</div>
<script src="login.js"></script>
</body>
</html>
