<!DOCTYPE html>

    <title>SUSA - ParSU</title>
    <link rel="icon" type="image/png" href="PSU.png">

<body>

<div class="top-bar"></div>

<div class="center-box">
    <img src="PSU.png" class="logo">

    <h2>Partido State University</h2>

    <div class="role">INSTRUCTOR</div>

    <form id="loginForm" class="form-stack" method="POST">
        <div class="input-group">
    <label>User ID:</label>
    <input type="text" name="username" id="username" required>
</div>

<div class="input-group">
    <label>Password:</label>
    <input type="password" name="password" id="password" required>
</div>

        <button type="submit" class="btn">Login</button>
    </form>
    <p id="message" style="color:red;"></p>
    <button class="btn gray">Forgot password</button>

    <div style="width:280px;margin:16px auto 0;padding:12px 16px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;text-align:center;">
